{% extends "base.html" %}
{% block content %}
<h2>控制台 — {{ user['login'] }}</h2>
<section class="card">
  <h3>你的包</h3>
  {% if packages %}
    <ul>
      {% for p in packages %}
        <li><a href="{{ url_for('package_view', name=p['name']) }}">{{ p['name'] }}</a></li>
      {% endfor %}
    </ul>
  {% else %}
    <p class="muted">你还没有创建包。</p>
  {% endif %}
</section>

<section class="card">
  <h3>创建包（仅注册包名，之后仍需上传版本）</h3>
  <form method="post" action="{{ url_for('create_package') }}">
    <input type="text" name="name" placeholder="包名 (letters, numbers, - or _)" required>
    <button type="submit">创建</button>
  </form>
</section>

<section class="card">
  <h3>上传包版本</h3>
  <p class="muted">去 <a href="{{ url_for('upload') }}">上传页面</a> 上传 zip 或 整个文件夹</p>
</section>
{% endblock %}
